<!DOCTYPE html>

<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<title>US Signal | Webex Calling Analytics</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<style>

:root{
--bg:#f6f8fb;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.10);
--shadow:0 8px 24px rgba(15,23,42,.08);

--accent:#0f62fe;
--good:#16a34a;
--warn:#f59e0b;
--bad:#dc2626;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
display:flex;
min-height:100vh;
}

.sidebar{
width:270px;
background:var(--card);
border-right:1px solid var(--line);
padding:18px 14px;
display:flex;
flex-direction:column;
gap:14px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
padding-bottom:14px;
border-bottom:1px solid var(--line);
}

.brand img{height:34px;}

.nav{display:flex;flex-direction:column;gap:6px;}

.nav a{
padding:10px;
border-radius:12px;
font-weight:800;
font-size:13px;
text-decoration:none;
color:var(--text);
}

.nav a.active{
background:rgba(15,98,254,.12);
border:1px solid rgba(15,98,254,.20);
}

.summary-pill{
margin-top:auto;
padding:12px;
border-radius:12px;
font-weight:900;
text-align:center;
}

.summary-green{background:rgba(22,163,74,.15);color:var(--good);}
.summary-amber{background:rgba(245,158,11,.15);color:var(--warn);}
.summary-red{background:rgba(220,38,38,.15);color:var(--bad);}

.main{
flex:1;
padding:22px;
display:flex;
flex-direction:column;
gap:18px;
}

.header-card{
background:var(--card);
border:1px solid var(--line);
border-radius:16px;
box-shadow:var(--shadow);
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:16px;
box-shadow:var(--shadow);
padding:16px;
}

.row{
display:flex;
gap:16px;
flex-wrap:wrap;
}

h2{
margin:0 0 12px 0;
font-size:14px;
font-weight:1000;
}

.muted{color:var(--muted);font-size:12px;}

table{
width:100%;
border-collapse:collapse;
}

thead th{
padding:12px;
font-size:12px;
color:var(--muted);
text-transform:uppercase;
}

tbody td{
padding:12px;
border-top:1px solid rgba(15,23,42,.06);
font-size:13px;
}

.right{text-align:right;}

button{
background:var(--accent);
color:#fff;
border:none;
padding:8px 14px;
border-radius:10px;
font-weight:800;
cursor:pointer;
}

canvas{width:100%;}

.badge{
padding:4px 10px;
border-radius:999px;
font-weight:900;
font-size:11px;
}

.badge-good{background:rgba(22,163,74,.15);color:var(--good);}
.badge-warn{background:rgba(245,158,11,.15);color:var(--warn);}
.badge-bad{background:rgba(220,38,38,.15);color:var(--bad);}

.rc-pill{
padding:6px 10px;
border-radius:8px;
font-weight:900;
font-size:12px;
}

.rc-network{background:#fee2e2;color:#991b1b;}
.rc-device{background:#dbeafe;color:#1e40af;}
.rc-codec{background:#fef3c7;color:#92400e;}
.rc-pstn{background:#e0f2fe;color:#0369a1;}

</style>

</head>

<body>

<div class="sidebar">

<div class="brand">
<img src="https://webex.onenecklab.com/assets/ussignal-logo.jpg">
<div>
<div style="font-weight:900;">US Signal</div>
<div class="muted">Customer Portal</div>
</div>
</div>

<div class="nav">
<a href="/customer">Dashboard</a>
<a href="/customer/licenses">Licenses</a>
<a href="/customer/devices">Devices</a>
<a class="active" href="/customer/analytics">Analytics</a>
<a href="/customer/cdr">CDR</a>
</div>

<div id="ragPill" class="summary-pill summary-green">GREEN</div>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<div class="header-card">
<div>
<div style="font-size:16px;font-weight:1000;">Operational Calling Analytics</div>
<div class="muted" id="tenantLine">Loading…</div>
</div>
<button id="btnExport">Export CSV</button>
</div>

<!-- ROOT CAUSE ANALYSIS -->

<div class="card">

<h2>Automatic Root Cause Detection</h2>

<table>

<thead>
<tr>
<th>Detected Issue</th>
<th class="right">Affected Calls</th>
<th>Root Cause</th>
</tr>
</thead>

<tbody id="rootCauseRows"></tbody>

</table>

</div>

<!-- MOS HISTOGRAM -->

<div class="card">
<h2>MOS Distribution</h2>
<canvas id="mosHistogram" height="120"></canvas>
</div>

<!-- PACKET LOSS ANOMALY -->

<div class="card">
<h2>Packet Loss Anomalies</h2>

<table>
<thead>
<tr>
<th>Time</th>
<th class="right">Packet Loss</th>
<th class="right">MOS</th>
</tr>
</thead>

<tbody id="anomalyRows"></tbody>

</table>

</div>

<!-- HEATMAP -->

<div class="card">
<h2>Call Quality Heatmap</h2>
<canvas id="qualityHeatmap" height="220"></canvas>
</div>

</div>

<script>

let ORG_ID
let MEDIA=[]

async function init(){

const me=await fetch("/api/me").then(r=>r.json())

ORG_ID=me.orgId

document.getElementById("tenantLine").textContent=me.orgName

const media=await fetch(`/api/analytics/media?orgId=${ORG_ID}`).then(r=>r.json())

MEDIA=media.records || []

drawHistogram()
drawHeatmap()
detectRootCauses()
renderAnomalies()

}

function drawHistogram(){

const canvas=document.getElementById("mosHistogram")
const ctx=canvas.getContext("2d")

const bins=[0,0,0,0,0]

MEDIA.forEach(r=>{

const mos=r.mos||0

if(mos>=4.5)bins[4]++
else if(mos>=4)bins[3]++
else if(mos>=3.5)bins[2]++
else if(mos>=3)bins[1]++
else bins[0]++

})

const max=Math.max(...bins)

bins.forEach((b,i)=>{

const x=i*80
const h=(b/max)*canvas.height

ctx.fillStyle="#0f62fe"
ctx.fillRect(x,canvas.height-h,50,h)

})

}

function renderAnomalies(){

const rows=document.getElementById("anomalyRows")

MEDIA.filter(r=>r.packetLoss>0.05).slice(0,10).forEach(r=>{

rows.innerHTML+=`
<tr>
<td>${r.startTime}</td>
<td class="right">${(r.packetLoss*100).toFixed(2)}%</td>
<td class="right">${r.mos?.toFixed(2)}</td>
</tr>
`

})

}

function drawHeatmap(){

const canvas=document.getElementById("qualityHeatmap")
const ctx=canvas.getContext("2d")

MEDIA.slice(0,500).forEach(r=>{

const x=r.packetLoss*canvas.width*5
const y=canvas.height-(r.mos*40)

ctx.fillStyle="rgba(15,98,254,.4)"
ctx.fillRect(x,y,4,4)

})

}

/* ROOT CAUSE DETECTION */

function detectRootCauses(){

const rows=document.getElementById("rootCauseRows")

const network=MEDIA.filter(r=>r.packetLoss>0.03||r.jitter>30)
const device=MEDIA.filter(r=>r.deviceModel && r.mos<3.5)
const codec=MEDIA.filter(r=>r.mos<3.2 && r.packetLoss<0.01)
const pstn=MEDIA.filter(r=>r.callResult==="failed")

rows.innerHTML=`

<tr>
<td>High packet loss / jitter</td>
<td class="right">${network.length}</td>
<td><span class="rc-pill rc-network">Network</span></td>
</tr>

<tr>
<td>Low MOS by endpoint</td>
<td class="right">${device.length}</td>
<td><span class="rc-pill rc-device">Device</span></td>
</tr>

<tr>
<td>Low MOS without packet loss</td>
<td class="right">${codec.length}</td>
<td><span class="rc-pill rc-codec">Codec</span></td>
</tr>

<tr>
<td>Failed calls</td>
<td class="right">${pstn.length}</td>
<td><span class="rc-pill rc-pstn">PSTN Path</span></td>
</tr>

`

}

function logout(){

fetch("/api/logout",{method:"POST"})
.then(()=>location.href="/")

}

init()

</script>

</body>
</html>
